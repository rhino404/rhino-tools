# Validates quiz datasets, blog drafts, and generated pages against their
# canonical schemas and freshness expectations. Gates pull requests and
# non-main branch pushes — does NOT deploy (deployment is handled separately
# by static.yml on push to main).
name: Validate datasets + content

on:
  pull_request:
    paths:
      - "src/datasets/**"
      - "src/core/dataSources.js"
      - "src/data/quizMeta.js"
      - "data-pipeline/**"
      - "blog-pipeline/**"
      - "src/blog/**"
      - "src/service-worker.js"
      - ".github/workflows/validate-data.yml"
  push:
    branches-ignore:
      - main
    paths:
      - "src/datasets/**"
      - "data-pipeline/**"
      - "blog-pipeline/**"
      - "src/blog/**"
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate datasets (schema + constraints + exam coupling)
        run: node data-pipeline/validate.mjs

      - name: Check dataset manifest is up to date
        run: |
          node data-pipeline/generate-manifest.mjs
          if ! git diff --exit-code -- src/datasets/index.json; then
            echo "::error::src/datasets/index.json is stale. Run 'node data-pipeline/generate-manifest.mjs' and commit the result."
            exit 1
          fi

      - name: Validate blog drafts
        run: node blog-pipeline/validate.mjs

      - name: Check hub pages are up to date
        run: |
          node data-pipeline/generate-pages.mjs --check || {
            echo "::error::Generated hub pages are stale. Run 'node data-pipeline/generate-pages.mjs' and commit the result."
            exit 1
          }

      - name: Check SW precaches all CSS
        run: node data-pipeline/check-sw-precache.mjs
