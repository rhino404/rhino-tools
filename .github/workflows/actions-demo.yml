name: GitHub Actions Demo
run-name: ${{ github.actor }} is testing out GitHub Actions 🚀
on: [push]
jobs:
  Explore-GitHub-Actions:
    runs-on: ubuntu-latest
    steps:
      - run: echo "🚀 The job was automatically triggered by a ${{ github.event_name }} event."
      - run: echo "🖥️ This job is running on a ${{ runner.os }} server hosted by GitHub!"
      - run: echo "🔀 The branch is ${{ github.ref }} and repository is ${{ github.repository }}."
      - name: Check out repository code
        uses: actions/checkout@v4
      - run: echo "📦 The repository has been cloned to the runner."
      - run: echo "⚡ The workflow is ready to test your code."
      - name: List files in the repository
        run: |
          ls ${{ github.workspace }}
      - run: echo "✅ Job completed."