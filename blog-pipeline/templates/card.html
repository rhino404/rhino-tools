<article class="blog-card" data-track="{{CARD_TRACK_CATEGORY}}" data-slug="{{CARD_SLUG}}">
  <div class="blog-card-banner blog-card-banner--{{CARD_TRACK_SLUG}}">
    <img src="{{CARD_TRACK_IMAGE}}" alt="{{CARD_TRACK_IMAGE_ALT}}" class="blog-card-img" width="1200" height="630" loading="lazy" decoding="async" />
    <span class="blog-card-track-badge">{{CARD_TRACK_LABEL}}</span>
    <span class="blog-card-icon">{{CARD_TRACK_ICON}}</span>
  </div>
  <div class="blog-card-body">
    <h2 class="blog-card-title">
      <a href="/blog/{{CARD_SLUG}}/">{{CARD_TITLE}}</a>
    </h2>
    <p class="blog-card-excerpt">{{CARD_EXCERPT}}</p>
    <div class="blog-card-meta">
      <time datetime="{{CARD_DATE_PUBLISHED}}">{{CARD_DATE_FORMATTED}}</time>
      <span class="blog-sep">·</span>
      <span>{{CARD_READING_TIME}} min read</span>
    </div>
  </div>
</article>
