<body class="dark-mode">
  <header>
    <div id="crypto-bar">
      <a href="/" aria-label="Home">
        <img src="./images/rhino404.jpeg" alt="Ryno Tools Rhino Logo" id="crypto-logo" />
      </a>
      <h3 id="crypto-title">Ryno Tools</h3>
      <span id="crypto-prices">Loading crypto prices...</span>
      <span id="dark-mode-toggle" class="clickable-icon" role="button" aria-label="Toggle dark mode">🌑</span>
    </div>
  </header>

  <nav aria-label="Quiz Filters">
    <div class="dropdown">
      <button id="category-toggle" class="dropdown-toggle" aria-haspopup="listbox" aria-expanded="false"
        aria-controls="category-options">Select Category ▾</button>
      <ul id="category-options" class="dropdown-menu" role="listbox"></ul>
    </div>
    <div class="dropdown">
      <button id="subcategory-toggle" class="dropdown-toggle" aria-haspopup="listbox" aria-expanded="false"
        aria-controls="subcategory-options">🌐 All Subcategories ▾</button>
      <ul id="subcategory-options" class="dropdown-menu" role="listbox"></ul>
    </div>
  </nav>

  <main id="quiz-container" tabindex="0" aria-live="polite">
    <h2 class="question" id="question"></h2>
    <div class="choices centered" id="choices"></div>
    <div class="explanation" id="explanation" aria-live="polite"></div>
  </main>

  <div class="button-group" id="controls">
    <button id="toggleAnswers" class="circle-btn" title="Toggle Answers">🫣</button>
    <button id="shuffle-btn" class="circle-btn" title="Shuffle">🔀</button>
    <button id="showStatsBtn" class="circle-btn" title="Show Stats">📊</button>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      document.getElementById("dark-mode-toggle").style.visibility = "visible";
    });
  </script>

  <footer>
    <div id="social-links">
      <a href="https://github.com/rhino404" target="_blank" rel="noopener noreferrer" aria-label="GitHub">
        <img src="https://github.githubassets.com/favicon.ico" alt="GitHub Logo">
      </a>
    </div>
    <a href="./pages/privacy.html" style="color:inherit; text-decoration:underline;">Privacy Policy</a>
    &nbsp;|&nbsp;
    <a href="./pages/terms.html" style="color:inherit; text-decoration:underline;">Terms of Service</a>
    <br /><br />
    <span id="copyright" style="padding-top: 1em;"></span>
    <br />
    <div id="pwaInstallBanner" class="hidden">
      <div class="pwa-banner-content">
        <span>📱 Install Ryno Tools - <i>Keep going. Keep growing.</i></span>
        <div class="pwa-banner-actions">
          <button id="installBtn">Install</button>
          <button id="dismissInstallBtn" class="dismiss-inside" aria-label="Dismiss">✖</button>
        </div>
      </div>
    </div>
  </footer>

  <script>
    document.getElementById('copyright').innerHTML = `Copyright © ${new Date().getFullYear()} Ryno Tools - <i>Keep going. Keep growing.</i> All rights reserved.`;
  </script>
  <script type="module" src="./scripts/pwaInstaller.js"></script>
