<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description"
    content="Rhino Tools provides a free, mobile-friendly study site for Python, machine learning, AI, NLP, Ham Radio, and more." />
  <meta name="keywords" content="quiz, Python, machine learning, AI, NLP, coding, education, CodeQuest" />
  <link rel="manifest" type="application/manifest+json" href="manifest.json" />
  <link rel="icon" type="image/x-icon" href="./images/favicon.ico" />
  <link rel="stylesheet" href="./styles/base.css" />
  <link rel="stylesheet" href="./styles/light.css" />
  <link rel="stylesheet" href="./styles/dark.css" />
  <title>Rhino Tools</title>
</head>

<body>
  <div id="crypto-bar">
    <span id="crypto-prices">Loading crypto prices...</span>
    <button id="dark-mode-toggle" aria-label="Toggle dark mode" aria-pressed="false">🌙</button>
  </div>
  <div class="dropdown">
    <button id="level-toggle" class="dropdown-toggle" aria-haspopup="listbox" aria-expanded="false"
      aria-controls="level-options">🎚️ Select Level ▾</button>
    <ul id="level-options" class="dropdown-menu" role="listbox" tabindex="-1" hidden>
      <li role="option" data-level="" tabindex="0">All Levels</li>
      <li role="option" data-level="beginner" tabindex="0">🟢 Beginner</li>
      <li role="option" data-level="intermediate" tabindex="0">🟡 Intermediate</li>
      <li role="option" data-level="advanced" tabindex="0">🔴 Advanced</li>
    </ul>
  </div>

  <div class="dropdown">
    <button id="category-toggle" class="dropdown-toggle" aria-haspopup="listbox" aria-expanded="false"
      aria-controls="category-options">📚 Select Category ▾</button>
    <ul id="category-options" class="dropdown-menu" role="listbox" tabindex="-1" hidden>
      <li role="option" data-category="" tabindex="0">All Categories</li>
      <li role="option" data-category="python" tabindex="0">🐍 Python</li>
      <li role="option" data-category="ml" tabindex="0">🤖 Machine Learning</li>
      <li role="option" data-category="nlp" tabindex="0">💬 NLP</li>
      <li role="option" data-category="mcp" tabindex="0">🔧 MCP</li>
      <li role="option" data-category="ham-radio" tabindex="0">📡 Ham Radio</li>
    </ul>
  </div>

  <div id="quiz-container" tabindex="0" aria-live="polite">
    <h2 class="question" id="question"></h2>
    <div class="choices" id="choices"></div>
    <div class="explanation" id="explanation" aria-live="polite"></div>
  </div>

  <div class="shuffle-wrapper">
    <button class="shuffle" id="shuffle-btn">Shuffle</button>
  </div>
  <div id="ad-slot" role="complementary" aria-label="Advertisement">Ad Placeholder</div>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      document.getElementById("dark-mode-toggle").style.visibility = "visible";
    });
  </script>
  <script type="module" src="./scripts/main.js"></script>

  <footer>
    <div id="social-links">
      <a href="https://x.com/rhino4O4" target="_blank" rel="noopener noreferrer" aria-label="X Twitter">
        <img src="https://abs.twimg.com/favicons/twitter.3.ico" alt="X (Twitter)">
      </a>
      <span aria-hidden="true">|</span>
      <a href="https://youtube.com/@rhino404" target="_blank" rel="noopener noreferrer" aria-label="YouTube">
        <img src="https://www.youtube.com/s/desktop/7b155292/img/logos/favicon_32x32.png" alt="YouTube">
      </a>
      <span aria-hidden="true">|</span>
      <a href="https://github.com/rhino404" target="_blank" rel="noopener noreferrer" aria-label="GitHub">
        <img src="https://github.githubassets.com/favicon.ico" alt="GitHub">
      </a>
    </div>
    <a href="./pages/privacy.html" style="color:inherit; text-decoration:underline;">Privacy Policy</a>
    &nbsp;|&nbsp;
    <a href="./pages/terms.html" style="color:inherit; text-decoration:underline;">Terms of Service</a>
    <br /><br />
    <span id="copyright" style="padding-top: 1em;"></span>
    <br />
  </footer>

  <script>
    document.getElementById('copyright').textContent = `© ${new Date().getFullYear()} Rhino Tools. All rights reserved.`;
  </script>
</body>

</html>
