<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description"
    content="Rhino404 provides a free, mobile-friendly quiz site for learning Python, machine learning, AI, and NLP concepts." />
  <meta name="keywords" content="quiz, Python, machine learning, AI, NLP, coding, education, CodeQuest" />
  <link rel="manifest" type="application/manifest+json" href="manifest.json" />
  <link rel="icon" type="image/x-icon" href="./images/favicon.ico" />
  <title>Rhino404</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 2rem;
      max-width: auto;
      margin: auto;
      background-image: linear-gradient(
        rgba(24, 24, 24, 0.8),
        rgba(255, 255, 255, 0.8)
      ), url(./images/rhino404.jpeg);
      background-size: cover;
      background-position: left top;
      background-repeat: no-repeat;
    }

    footer {
      text-align: center;
      font-size: 0.9em;
      color: #888;
      margin-top: 2em;
    }

    .question {
      font-size: 1.5rem;
      margin-bottom: 1rem;
    }

    .choices button {
      display: block;
      margin: 0.5rem 0;
      padding: 0.5rem;
      font-size: 1rem;
      width: 100%;
    }

    .correct {
      color: green;
    }

    .incorrect {
      color: red;
    }

    .explanation {
      margin-top: 1rem;
      background: #f9f9f9;
      padding: 1rem;
      border: 4px solid #ccc;
    }

    #ad-slot {
      margin: 2rem 0;
      text-align: center;
      background: #eee;
      padding: 1rem;
    }

    #crypto-bar {
      font-size: 0.9rem;
      background: #503f30;
      color: #fff;
      padding: 0.5rem;
      margin-bottom: 1rem;
      text-align: center;
    }

    .shake {
      animation: shake 0.4s;
    }

    @keyframes shake {
      0% {
        transform: translateX(0);
      }

      25% {
        transform: translateX(-5px);
      }

      50% {
        transform: translateX(5px);
      }

      75% {
        transform: translateX(-5px);
      }

      100% {
        transform: translateX(0);
      }
    }

    .dimmed {
      opacity: 0.5;
    }
    .dimmed:hover {
      opacity: 0.7;
    }

    button.dimmed {
      opacity: 0.5;
      /* pointer-events: auto;  <-- keep clickable */
    }

    .shuffle {
      margin-top: 1rem;
      display: block;
      margin-left: auto;
      margin-right: auto;
      min-height: 48px;
      font-size: 1.1em;
      border-radius: 8px;
      margin-bottom: 0.75em;
      transition: background 0.2s;
    }

    .choices button,
    .level-btn {
      min-height: 36px;
      font-size: 0.95em;
      border-radius: 8px;
      margin-bottom: 0.5em;
      padding: 0.4em 0.8em;
      transition: background 0.2s;
    }
    .choices button:hover,
    .category-btn {
      min-height: 36px;
      font-size: 0.95em;
      border-radius: 8px;
      margin-bottom: 0.5em;
      padding: 0.4em 0.8em;
      transition: background 0.2s;
    }

    .choices button:active,
    .level-btn:active,
    .category-btn:active,
    .shuffle:active {
      background: #e0e0e0;
    }



    /* Dark mode styles */
    body.dark-mode {
      background: #181818;
      color: #eee;
      background-image: linear-gradient(
        rgba(24, 24, 24, 0.8),
        rgba(58, 58, 58, 0.8)
      ), url(./images/rhino404.jpeg);
      background-size: cover;
      background-position: left top;
      background-repeat: no-repeat;
    }

    body.dark-mode .question {
      color: #fff;
    }

    body.dark-mode .choices button,
    body.dark-mode .level-btn,
    body.dark-mode .category-btn {
      background: #333;
      color: #eee;
      border: 1px solid #444;
    }
    body.dark-mode .shuffle {
      background: #222;
      color: #eee;
      border: 1px solid #444;
    }

    body.dark-mode .choices button:active,
    body.dark-mode .level-btn:active,
    body.dark-mode .category-btn:active,
    body.dark-mode .shuffle:active {
      background: #333;
    }

    body.dark-mode .explanation {
      background: #222;
      border: 4px solid #444;
    }

    body.dark-mode #crypto-bar {
      background: #222;
      color: #fff;
    }

    body.dark-mode #ad-slot {
      background: #222;
      color: #ccc;
    }

    #dark-mode-toggle {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: none;
      background: #f0f0f0;
      color: #222;
      font-size: 1.7em;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      cursor: pointer;
      float: right;
      margin-bottom: 1em;
      transition: background 0.2s, color 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    body.dark-mode #dark-mode-toggle {
      background: #222;
      color: #ffe066;
    }
  </style>
</head>

<body>
  <div id="crypto-bar" role="region" aria-live="polite" aria-label="Cryptocurrency prices">Loading crypto prices...
  </div>
  <button id="dark-mode-toggle" aria-label="Toggle dark mode" aria-pressed="false"></button>

  <div id="level-filters" style="margin-bottom:1em;">
    <button class="level-btn" data-level="" aria-pressed="true">All Levels</button>
    <button class="level-btn" data-level="beginner">🟢 Beginner</button>
    <button class="level-btn" data-level="intermediate">🟡 Intermediate</button>
    <button class="level-btn" data-level="advanced">🔴 Advanced</button>
  </div>

  <div id="category-filters" style="margin-bottom:1em;">
    <button class="category-btn" data-category="" aria-pressed="true">All Categories</button>
    <button class="category-btn" data-category="python">🐍 Python</button>
    <button class="category-btn" data-category="ml">🤖 Machine Learning</button>
    <button class="category-btn" data-category="nlp">💬 NLP</button>
    <button class="category-btn" data-category="mcp">🔧 MCP</button>
  </div>

  <div id="quiz-container" tabindex="0" aria-live="polite">
    <h2 class="question" id="question"></h2>
    <div class="choices" id="choices"></div>
    <div class="explanation" id="explanation" aria-live="polite"></div>
  </div>

  <button class="shuffle" id="shuffle-btn">Shuffle</button>
  <div id="ad-slot" role="complementary" aria-label="Advertisement">Ad Placeholder</div>

  <script type="module" src="./scripts/main.js"></script>

  <footer style="text-align:center; font-size:0.9em; color:#888; margin-top:2em;">
    <a href="./pages/privacy.html" style="color:inherit; text-decoration:underline;">Privacy Policy</a>
    &nbsp;|&nbsp;
    <a href="./pages/terms.html" style="color:inherit; text-decoration:underline;">Terms of Service</a>
    <br />
    <br />
    <span id="copyright" style="padding-top: 1em;"></span>
    <br />
    <!-- Social media links can be added here -->
    <div id="social-links" style="margin-top: 1em;">
      <a href="https://x.com/rhino404" target="_blank" rel="noopener noreferrer">
        <img src="https://abs.twimg.com/favicons/twitter.3.ico" alt="X (Twitter)" style="width:24px; height:24px;">
      </a>
      &nbsp;|&nbsp;
      <a href="https://youtube.com/@rhino404" target="_blank" rel="noopener noreferrer">
        <img src="https://www.youtube.com/s/desktop/7b155292/img/logos/favicon_32x32.png" alt="YouTube" style="width:24px; height:24px;">
      </a>
      &nbsp;|&nbsp;
      <a href="https://github.com/@rhino404" target="_blank" rel="noopener noreferrer">
        <img src="https://github.githubassets.com/favicon.ico" alt="GitHub" style="width:24px; height:24px;">
      </a>
    </div>
  </footer>

  <script>
    document.getElementById('copyright').textContent =
      `© ${new Date().getFullYear()} Rhino404`;

    // Update dark mode toggle aria-pressed dynamically
    const darkModeToggle = document.getElementById('dark-mode-toggle');
    function updateAriaPressed() {
      darkModeToggle.setAttribute('aria-pressed', document.body.classList.contains('dark-mode'));
    }
    darkModeToggle.addEventListener('click', () => {
      updateAriaPressed();
    });
    updateAriaPressed();
  </script>
</body>

</html>
