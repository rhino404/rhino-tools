<body class="dark-mode">
  <header>
    <div id="crypto-bar">
      <a href="/" aria-label="Home">
        <img src="./images/rhino404.jpeg" alt="Rhino Logo" id="crypto-logo" />
      </a>
      <h3 id="crypto-title">Rhino.Tools</h3>
      <span id="crypto-prices">Loading crypto prices...</span>
      <button id="dark-mode-toggle" aria-label="Toggle dark mode" aria-pressed="false">🌙</button>
    </div>
  </header>

  <nav aria-label="Quiz Filters">
    <div class="dropdown">
      <button id="level-toggle" class="dropdown-toggle" aria-haspopup="listbox" aria-expanded="false"
        aria-controls="level-options">🎚️ Select Level ▾</button>
      <ul id="level-options" class="dropdown-menu" role="listbox" tabindex="-1" hidden>
        <li role="option" data-level="" tabindex="0"> 🌐 All Levels</li>
        <li role="option" data-level="beginner" tabindex="0">🟢 Beginner</li>
        <li role="option" data-level="intermediate" tabindex="0">🟡 Intermediate</li>
        <li role="option" data-level="advanced" tabindex="0">🔴 Advanced</li>
      </ul>
    </div>

    <div class="dropdown">
      <button id="category-toggle" class="dropdown-toggle" aria-haspopup="listbox" aria-expanded="false"
        aria-controls="category-options">📚 Select Category ▾</button>
      <ul id="category-options" class="dropdown-menu" role="listbox" tabindex="-1" hidden>
        <li role="option" data-category="" tabindex="0"> 🌐 All Categories</li>
        <li role="option" data-category="python" tabindex="0">🐍 Python</li>
        <li role="option" data-category="ml" tabindex="0">🤖 Machine Learning</li>
        <li role="option" data-category="nlp" tabindex="0">💬 NLP</li>
        <li role="option" data-category="mcp" tabindex="0">🔧 MCP</li>
        <li role="option" data-category="ham-radio" tabindex="0">📡 Ham Radio</li>
        <li role="option" data-category="git" tabindex="0">🐙 Git</li>
        <li role="option" data-category="frontend" tabindex="0">🎨 Frontend Development</li>
        <li role="option" data-category="docker" tabindex="0">🐳 Docker</li>
      </ul>
    </div>
  </nav>

  <main id="quiz-container" tabindex="0" aria-live="polite">
    <h2 class="question" id="question"></h2>
    <div class="choices centered" id="choices"></div>
    <div class="explanation" id="explanation" aria-live="polite"></div>
  </main>

  <div class="button-group" id="controls">
    <button id="toggleAnswers" class="circle-btn" title="Toggle Answers">✔️</button>
    <button id="shuffleBtn" class="circle-btn" title="Shuffle">🔀</button>
  </div>
  
  <div id="ezoic-pub-ad-placeholder-961"></div>
  <script>
      ezstandalone.cmd.push(function () {
          ezstandalone.showAds(961, {
              "adType": "incontent",
              "adSize": "fluid",
              "adFormat": "auto",
              "adPosition": "bottom"
          });
      });
  </script>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      document.getElementById("dark-mode-toggle").style.visibility = "visible";
    });
  </script>
  <script type="module" src="./scripts/main.js"></script>

  <footer>

    document.getElementById('copyright').textContent = `© ${new Date().getFullYear()} Rhino Tools. All rights reserved.`;
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./scripts/sw.js')
          .then(reg => {
            console.log('Service worker registered:', reg.scope);
          })
          .catch(err => {
            console.error('Service worker registration failed:', err);
          });
      });
    }
  </script>
